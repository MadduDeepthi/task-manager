name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install
      
      - name: Start server
        run: node app.js &

      - name: Wait for server
        run: sleep 3

      - name: Run tests
        run: npm test

  docker: 
    needs: test
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t task-app .
      
      - name: Run container in background
        run: docker run -d -p 3000:3000 task-app

      - name: Wait for container
        run: sleep 5

      - name: Test API inside container
        run: npm test